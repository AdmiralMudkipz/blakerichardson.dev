<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blake Richardson - Software Developer{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/media/favicon_io/favicon.ico" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #202531 !important;
            color: #e0e0e0 !important;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
</head>

<body class="antialiased">

    <style>
        .resume-dropdown { position: relative; display: inline-block; }
        .resume-dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: #1E1E2E;
            border: 1px solid #444;
            border-radius: 8px;
            min-width: 210px;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.45);
            overflow: hidden;
        }
        .resume-dropdown:hover .resume-dropdown-menu,
        .resume-dropdown:focus-within .resume-dropdown-menu { display: block; }
        .resume-dropdown-menu a {
            display: block;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: #C0C0C0;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .resume-dropdown-menu a:hover { background: #2A2A3A; color: #fff; }
        .resume-dropdown-menu a + a { border-top: 1px solid #333; }

        #mobile-menu { display: none; }
        #mobile-menu.open { display: block; }
        @media (max-width: 768px) {
            .desktop-nav { display: none !important; }
        }
    </style>

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <a href="/portfolio/homepage/" class="text-xl font-bold text-[#478cbf] hover:text-[#6ab0e3] transition tracking-wide">
                BLAKE_RICHARDSON
            </a>

                <a href="/portfolio/homepage/#skills"     class="hover:text-white transition hover:underline decoration-[#478cbf] decoration-2 underline-offset-4">Skills</a>
                <a href="/portfolio/homepage/#projects"   class="hover:text-white transition hover:underline decoration-[#478cbf] decoration-2 underline-offset-4">Projects</a>
                <a href="/portfolio/homepage/#experience" class="hover:text-white transition hover:underline decoration-[#478cbf] decoration-2 underline-offset-4">Experience</a>
                <a href="/portfolio/homepage/#contact"    class="hover:text-white transition hover:underline decoration-[#478cbf] decoration-2 underline-offset-4">Contact</a>

                <a href="https://github.com/AdmiralMudkipz" target="_blank" title="GitHub" class="hover:text-white transition" aria-label="GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
                </a>
                <a href="https://www.linkedin.com/in/blakeevanrichardson/" target="_blank" title="LinkedIn" class="hover:text-white transition" aria-label="LinkedIn">

                <div class="resume-dropdown">
                    <button class="bg-[#478cbf] hover:bg-[#6ab0e3] text-white text-sm font-semibold px-4 py-1.5 rounded-lg transition flex items-center gap-1">
                        Resume

                    </button>
                    <div class="resume-dropdown-menu">
                        <a href="/media/resume_swe.pdf" target="_blank">Software Engineering Resume</a>
                        <a href="/media/resume_it.pdf"  target="_blank">IT / Systems Resume</a>
                    </div>
                </div>
            </nav>

            <button id="hamburger-btn" class="md:hidden text-gray-400 hover:text-white focus:outline-none" aria-label="Open menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>

            <div class="pt-1 border-t border-gray-600 space-y-2">
                <a href="/media/resume_swe.pdf" target="_blank" class="block hover:text-white transition">Software Engineering Resume</a>
                <a href="/media/resume_it.pdf"  target="_blank" class="block hover:text-white transition">IT / Systems Resume</a>
            </div>
            <div class="flex gap-5 pt-1 border-t border-gray-600">
                <a href="https://github.com/AdmiralMudkipz" target="_blank" class="hover:text-white transition" aria-label="GitHub">

                </a>
                <a href="https://www.linkedin.com/in/blakeevanrichardson/" target="_blank" class="hover:text-white transition" aria-label="LinkedIn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452H17.21v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.984V9h3.113v1.561h.045c.434-.823 1.494-1.691 3.074-1.691 3.289 0 3.894 2.165 3.894 4.979v6.603zM5.337 7.433a1.807 1.807 0 1 1 0-3.614 1.807 1.807 0 0 1 0 3.614zm1.559 13.019H3.778V9h3.118v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
                </a>
            </div>
        </div>
    </header>

    <script>
        document.getElementById('hamburger-btn').addEventListener('click', function () {
            document.getElementById('mobile-menu').classList.toggle('open');
        });
        document.querySelectorAll('#mobile-menu a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('mobile-menu').classList.remove('open');
            });
        });
    </script>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-5xl">
        {% block content %}
        {% endblock %}
    </main>

            <div class="flex justify-center gap-6 mb-4">
                <a href="https://github.com/AdmiralMudkipz" target="_blank" aria-label="GitHub" class="hover:text-gray-300 transition">

                </a>
                <a href="mailto:blake@blakerichardson.dev" aria-label="Email" class="hover:text-gray-300 transition">

</html>
